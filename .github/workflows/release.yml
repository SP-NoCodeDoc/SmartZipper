name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish Windows x64
        run: dotnet publish ZipperApp/ZipperApp.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish/win-x64

      - name: Rename exe
        run: Rename-Item publish/win-x64/ZipperApp.exe SmartZipper.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartZipper-Windows-x64
          path: publish/win-x64/SmartZipper.exe
          compression-level: 0

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish macOS ARM64
        run: dotnet publish ZipperApp/ZipperApp.csproj -c Release -r osx-arm64 --self-contained true -o publish/osx-arm64

      - name: Publish macOS x64
        run: dotnet publish ZipperApp/ZipperApp.csproj -c Release -r osx-x64 --self-contained true -o publish/osx-x64

      - name: Create app bundle (ARM64)
        run: |
          mkdir -p SmartZipper.app/Contents/MacOS
          mkdir -p SmartZipper.app/Contents/Resources
          cp publish/osx-arm64/* SmartZipper.app/Contents/MacOS/ 2>/dev/null || true
          cp ZipperApp/Assets/AppIcon.icns SmartZipper.app/Contents/Resources/AppIcon.icns
          chmod +x SmartZipper.app/Contents/MacOS/ZipperApp
          cat > SmartZipper.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>SmartZipper</string>
            <key>CFBundleDisplayName</key><string>SmartZipper</string>
            <key>CFBundleIdentifier</key><string>com.nocodedoc.smartzipper</string>
            <key>CFBundleVersion</key><string>1.1.0</string>
            <key>CFBundleShortVersionString</key><string>1.1.0</string>
            <key>CFBundleExecutable</key><string>ZipperApp</string>
            <key>CFBundleIconFile</key><string>AppIcon</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          EOF

      - name: Upload macOS ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartZipper-macOS-ARM64
          path: SmartZipper.app
          compression-level: 0

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartZipper-macOS-x64
          path: publish/osx-x64/
          compression-level: 0

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: SmartZipper-Windows-x64
          path: release/windows

      - name: Download macOS ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: SmartZipper-macOS-ARM64
          path: release/macos-arm64

      - name: Download macOS x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: SmartZipper-macOS-x64
          path: release/macos-x64

      - name: Package for release
        run: |
          cd release
          mv macos-arm64 SmartZipper.app
          zip -r ../SmartZipper-macOS-ARM64.zip SmartZipper.app/
          zip -r ../SmartZipper-macOS-x64.zip macos-x64/
          cp windows/SmartZipper.exe ../SmartZipper-Windows-x64.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            SmartZipper-Windows-x64.exe
            SmartZipper-macOS-ARM64.zip
            SmartZipper-macOS-x64.zip

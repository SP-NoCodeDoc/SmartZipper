name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish Windows x64
        run: dotnet publish ZipperApp/ZipperApp.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish/win-x64

      - name: Zip Windows build
        run: Compress-Archive -Path publish/win-x64/ZipperApp.exe -DestinationPath SmartZipper-Windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: SmartZipper-Windows-x64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish macOS ARM64
        run: dotnet publish ZipperApp/ZipperApp.csproj -c Release -r osx-arm64 --self-contained true -o publish/osx-arm64

      - name: Publish macOS x64
        run: dotnet publish ZipperApp/ZipperApp.csproj -c Release -r osx-x64 --self-contained true -o publish/osx-x64

      - name: Create app bundle (ARM64)
        run: |
          mkdir -p SmartZipper-ARM64.app/Contents/MacOS
          mkdir -p SmartZipper-ARM64.app/Contents/Resources
          cp publish/osx-arm64/* SmartZipper-ARM64.app/Contents/MacOS/ 2>/dev/null || true
          cp ZipperApp/Assets/AppIcon.icns SmartZipper-ARM64.app/Contents/Resources/AppIcon.icns
          chmod +x SmartZipper-ARM64.app/Contents/MacOS/ZipperApp
          cat > SmartZipper-ARM64.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>SmartZipper</string>
            <key>CFBundleDisplayName</key><string>SmartZipper</string>
            <key>CFBundleIdentifier</key><string>com.nocodedoc.smartzipper</string>
            <key>CFBundleVersion</key><string>1.1.0</string>
            <key>CFBundleShortVersionString</key><string>1.1.0</string>
            <key>CFBundleExecutable</key><string>ZipperApp</string>
            <key>CFBundleIconFile</key><string>AppIcon</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          EOF

      - name: Zip macOS builds
        run: |
          zip -r SmartZipper-macOS-ARM64.zip SmartZipper-ARM64.app
          zip -r SmartZipper-macOS-x64.zip publish/osx-x64/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            SmartZipper-macOS-ARM64.zip
            SmartZipper-macOS-x64.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            SmartZipper-Windows-x64.zip
            SmartZipper-macOS-ARM64.zip
            SmartZipper-macOS-x64.zip
